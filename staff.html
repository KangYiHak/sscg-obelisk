<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Staff Access</title>
<style>
body{background:black;color:white;font-family:Georgia;text-align:center;padding:120px}
a{display:block;margin:20px;color:#6b0f1a}
</style>
</head>
<body>

<h1>STAFF PORTAL</h1>

<a href="cctv.html">CCTV LOG</a>
<a href="operations.html">OPERATION LOG</a>

<audio id="bgm" loop></audio>

<script>
const bgm = document.getElementById("bgm");

// 저장된 음악 불러오기
const savedSrc = localStorage.getItem("bgmSrc");
const savedTime = localStorage.getItem("bgmTime");

if(savedSrc){
  bgm.src = savedSrc;
  bgm.currentTime = savedTime || 0;
}

// 클릭 시 재생 (모바일 대응)
document.addEventListener("click", () => {
  bgm.play().catch(()=>{});
}, { once: true });

// 재생 위치 계속 저장
setInterval(() => {
  localStorage.setItem("bgmTime", bgm.currentTime);
}, 500);
</script>

</body>
</html>
