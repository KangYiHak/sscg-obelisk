<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAGIC BUNNY ARCADE</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body{
 background:black;
 color:#ff0033;
 font-family:Courier New, monospace;
 text-align:center;
 overflow:hidden;
}

/* 글리치 */
.glitch{
 animation:flicker 0.8s infinite;
}
@keyframes flicker{
 0%{opacity:1}
 50%{opacity:0.2}
 100%{opacity:1}
}

/* 흔들림 */
.shake{
 animation:shake 0.2s infinite;
}
@keyframes shake{
 0%{transform:translate(0,0)}
 25%{transform:translate(1px,-1px)}
 50%{transform:translate(-1px,1px)}
 75%{transform:translate(1px,1px)}
}

/* 버튼 */
button{
 margin-top:40px;
 padding:10px 20px;
 border:1px solid #ff0033;
 background:none;
 color:#ff0033;
 cursor:pointer;
}
button:hover{
 background:#ff0033;
 color:black;
}

/* 점수 */
#score{
 position:fixed;
 top:20px;
 right:20px;
 font-family:'Press Start 2P', monospace;
 font-size:12px;
 color:#00ff9c;
}

/* 풍선 */
.balloon{
 position:absolute;
 font-size:30px;
 cursor:pointer;
}

/* 토끼 */
#bunny{
 position:fixed;
 bottom:20px;
 right:20px;
 width:120px;
 cursor:pointer;
}

/* 대사 */
#dialogue{
 position:fixed;
 bottom:160px;
 right:20px;
 background:black;
 border:1px solid #ff0033;
 padding:10px;
 width:220px;
 font-size:12px;
 color:#ff0033;
 display:none;
}

/* 팝업 */
#popup{
 position:fixed;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);
 background:#111;
 border:2px solid #00ff9c;
 padding:30px;
 display:none;
 z-index:999;
 text-align:center;
}

/* 화면 꺼짐 */
#blackout{
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 background:black;
 display:none;
 z-index:1000;
}
</style>

<script>

/* ⚠ 진입 경고 */
window.onload = function(){
 let ok = confirm("이 구역은 강한 시각 효과 및 불쾌감을 유발할 수 있습니다.\n계속하시겠습니까?");
 if(!ok){
  window.location.href="index.html";
 }
}

/* ENTER */
function enterGame(){
 window.location.href="arcade_log.html";
}

/* 🐇 토끼 */
let lines = [
 "WELCOME :)",
 "PLAY WITH US",
 "YOU CAME FROM THE HOTEL?",
 "STAY LONGER",
 "DON'T TELL THEM",
 "YOU ARE COUNTED"
];

function bunnyTalk(){
 let box = document.getElementById("dialogue");
 box.style.display = "block";
 box.innerText = lines[Math.floor(Math.random()*lines.length)];
}

/* 🎈 게임 */
let score = 0;
let unlocked = false;

function spawnBalloon(){

 let b = document.createElement("div");

 /* 10% 확률 이상한 풍선 */
 if(Math.random() < 0.1){
  b.innerText = "🎈?";
 } else {
  b.innerText = "🎈";
 }

 b.className = "balloon";
 b.style.left = Math.random()*90+"%";
 b.style.top = "100%";

 b.onclick = function(){

  /* ❗ 수상한 풍선 */
  if(b.innerText === "🎈?"){
   showText("DON'T TOUCH THAT", b);
   b.remove();
   return;
  }

  /* 💀 ERROR (점수는 줌) */
  if(Math.random() < 0.2){
   showText("ERROR : INVALID INPUT", b);
  }

  /* 점수 증가 */
  score += 100;
  document.getElementById("score").innerText = "SCORE : " + score;

  b.remove();

  glitchEffect();

  if(score >= 1000 && !unlocked){
   unlocked = true;
   triggerBlackout();
  }
 };

 document.body.appendChild(b);

 let move = setInterval(()=>{
  let top = parseInt(b.style.top);
  b.style.top = (top - 1) + "%";

  if(top < 0){
   clearInterval(move);
   b.remove();
  }
 },30);
}

setInterval(spawnBalloon,1000);

/* 💀 텍스트 출력 */
function showText(text, b){
 let msg = document.createElement("p");
 msg.innerText = text;
 msg.style.color = "#ff0033";
 msg.style.position = "absolute";
 msg.style.left = b.style.left;
 msg.style.top = b.style.top;

 document.body.appendChild(msg);
 setTimeout(()=>msg.remove(),1000);
}

/* 💀 이상현상 */
function glitchEffect(){

 if(score >= 300){
  document.body.style.background = "#0a0000";
 }

 if(score >= 600){
  document.body.classList.add("glitch");
 }

 if(score >= 800){
  document.body.classList.add("shake");
 }
}

/* 🖤 화면 꺼짐 */
function triggerBlackout(){

 let black = document.getElementById("blackout");
 black.style.display = "block";

 setTimeout(()=>{
  black.style.display = "none";
  showPopup();
 },1500);
}

/* 🎉 팝업 */
function showPopup(){
 document.getElementById("popup").style.display="block";
 alert("CONGRATULATIONS :)");
}

</script>

</head>

<body>

<h1 class="glitch">MAGIC BUNNY ARCADE</h1>

<p class="shake">WELCOME.</p>
<p>PLAY.</p>
<p>STAY.</p>
<p>DO NOT LEAVE.</p>

<div id="score">SCORE : 0</div>

<button onclick="enterGame()">ENTER</button>

<!-- 🐇 -->
<img src="bunny.png" id="bunny" onclick="bunnyTalk()">
<div id="dialogue"></div>

<!-- 🎉 -->
<div id="popup">
 <h2>CONGRATULATIONS :)</h2>
 <p>YOU MAY PROCEED</p>
 <a href="broadcast.html" style="color:#00ff9c;">OPEN CHANNEL</a>
</div>

<!-- 🖤 -->
<div id="blackout"></div>

</body>
</html>
