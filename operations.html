<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Operation Log</title>
<style>
body{background:black;color:#ccc;font-family:Georgia;padding:80px}
</style>
</head>
<body>

<h1>HOTEL OPERATION LOG</h1>

<p>log_01 : 신규 손님 증가</p>
<p>log_02 : 이름 기록 금지 규정 재확인</p>
<p>log_03 : 일부 손님 형태 불안정</p>
<p>log_04 : 객실 302 접근 금지</p>
<p>log_05 : 지하 1층 이상 현상 감지</p>
<p>log_06 : 지하 1층 직원 호출 실패</p>
<p>log_07 : 지하 진입로 폐쇄</p>

<audio id="bgm" loop></audio>

<script>
const bgm = document.getElementById("bgm");

// 저장된 음악 불러오기
const savedSrc = localStorage.getItem("bgmSrc");
const savedTime = localStorage.getItem("bgmTime");

if(savedSrc){
  bgm.src = savedSrc;
  bgm.currentTime = savedTime || 0;
}

// 클릭 시 재생 (모바일 대응)
document.addEventListener("click", () => {
  bgm.play().catch(()=>{});
}, { once: true });

// 재생 위치 계속 저장
setInterval(() => {
  localStorage.setItem("bgmTime", bgm.currentTime);
}, 500);
</script>

</body>
</html>
