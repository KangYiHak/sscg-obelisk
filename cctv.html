<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CCTV</title>
<style>
body{background:black;color:#ccc;font-family:Georgia;padding:80px}
</style>
</head>

<body>

<h1>CCTV RECORD</h1>

<p>camera_01 : lobby 정상</p>
<p>camera_02 : exhibition hall 조명 점멸</p>
<p>camera_03 : 복도에서 형태 불명 개체 이동</p>
<p>camera_04 : 기록 손상</p>
<p>camera_05 : 허용되지 않은 접근</p>
<p onclick="enterArcade()" style="cursor:pointer; color:#444;">
camera_13 : signal interference detected
</p>

  <script>
function enterArcade(){
 
 let confirmEnter = confirm(
 "이 구역은 강한 시각 효과 및 불쾌감을 유발할 수 있는 요소를 포함합니다.\n\n계속하시겠습니까?"
 );

 if(confirmEnter){
  window.location.href = "arcade.html";
 }

}
</script>

<audio id="bgm" loop></audio>

<script>
const bgm = document.getElementById("bgm");

// 저장된 음악 불러오기
const savedSrc = localStorage.getItem("bgmSrc");
const savedTime = localStorage.getItem("bgmTime");

if(savedSrc){
  bgm.src = savedSrc;
  bgm.currentTime = savedTime || 0;
}

// 클릭 시 재생 (모바일 대응)
document.addEventListener("click", () => {
  bgm.play().catch(()=>{});
}, { once: true });

// 재생 위치 계속 저장
setInterval(() => {
  localStorage.setItem("bgmTime", bgm.currentTime);
}, 500);
</script>

</body>
</html>
